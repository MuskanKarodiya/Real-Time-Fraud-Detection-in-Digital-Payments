# CI/CD Pipeline for Fraud Detection API
# Following project_guide.md Section 7

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # Job 1: Run tests
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests with coverage
        run: |
          pip install pytest pytest-cov
          pytest tests/ -v --cov=app --cov-report=xml --cov-report=term

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  # Job 2: Build Docker image
  build:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build -t fraud-detection-api:test .

      - name: Test Docker image
        run: |
          docker run -d --name test-container -p 8000:8000 fraud-detection-api:test
          sleep 5
          curl -f http://localhost:8000/api/v1/health || exit 1

  # Job 3: Deploy to EC2 (only on main branch)
  deploy:
    needs: [test, build]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Configure SSH key for EC2 access
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 13.61.71.115 >> ~/.ssh/known_hosts

      # Copy deployment script to EC2
      - name: Copy deploy script
        run: |
          scp -i ~/.ssh/deploy_key \
            .github/scripts/deploy.sh \
            ubuntu@13.61.71.115:/home/ubuntu/

      # Execute deployment on EC2
      - name: Deploy to EC2
        run: |
          ssh -i ~/.ssh/deploy_key ubuntu@13.61.71.115 \
            "chmod +x /home/ubuntu/deploy.sh && /home/ubuntu/deploy.sh main"

      # Health check
      - name: Verify deployment
        run: |
          sleep 10
          response=$(curl -s -o /dev/null -w "%{http_code}" http://13.61.71.115:8000/api/v1/health)
          if [ "$response" != "200" ]; then
            echo "Deployment health check failed with status: $response"
            exit 1
          fi
          echo "✓ Deployment verified - API is healthy!"
